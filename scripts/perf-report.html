<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Runtime Perf Report</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #fff; --fg: #1a1a2e; --card: #f8f9fa; --border: #dee2e6;
      --red: #dc3545; --green: #198754; --red-bg: rgba(220,53,69,0.08); --green-bg: rgba(25,135,84,0.08);
      --muted: #6c757d;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a2e; --fg: #e0e0e0; --card: #16213e; --border: #334;
        --red: #ff6b6b; --green: #51cf66; --red-bg: rgba(255,107,107,0.12); --green-bg: rgba(81,207,102,0.12);
        --muted: #99a;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--fg); padding: 24px; max-width: 1200px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 4px; }
    .subtitle { color: var(--muted); margin-bottom: 16px; font-size: 0.9rem; }
    h2 { font-size: 1.2rem; margin: 24px 0 12px; }
    .controls { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .controls label { font-weight: 600; }
    select, input[type="file"] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--fg); font-size: 0.9rem; }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 820px) { .charts { grid-template-columns: 1fr; } }
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .chart-card h3 { font-size: 1rem; margin-bottom: 8px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: right; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    th:first-child, td:first-child { text-align: left; }
    th { font-weight: 600; background: var(--card); position: sticky; top: 0; }
    .regression { background: var(--red-bg); }
    .improvement { background: var(--green-bg); }
    .warn { color: var(--red); font-weight: 700; }
    .good { color: var(--green); }
    canvas { max-height: 280px; }
    code { background: var(--card); padding: 1px 4px; border-radius: 3px; font-size: 0.85em; }
  </style>
</head>
<body>
  <h1>JS Runtime Perf Report</h1>
  <p class="subtitle">Secutils – Deno/V8 script execution trends</p>

  <div class="controls">
    <input type="file" id="fileInput" accept=".jsonl,.json,.txt">
    <label for="metric">Metric:</label>
    <select id="metric">
      <option value="p50_us" selected>p50 latency</option>
      <option value="p90_us">p90 latency</option>
      <option value="p99_us">p99 latency</option>
      <option value="max_us">max latency</option>
      <option value="mean_us">mean latency</option>
      <option value="throughput_ops_per_sec">throughput (ops/s)</option>
      <option value="peak_rss_delta_kb">peak RSS delta (KB)</option>
    </select>
  </div>

  <div id="empty" class="empty">
    <p>Load a <code>history.jsonl</code> file to view performance trends.</p>
    <p style="margin-top:8px;font-size:0.85rem;">Typically at <code>.perf/history.jsonl</code></p>
  </div>

  <div id="content" style="display:none;">
    <div class="charts" id="scenarioCharts"></div>

    <h2>Latest vs Previous</h2>
    <table id="comparisonTable"></table>

    <h2>Full History</h2>
    <div style="max-height:400px;overflow:auto;">
      <table id="historyTable"></table>
    </div>
  </div>

  <script>
    const COLORS = ['#4e79a7','#f28e2b','#e15759','#76b7b2','#59a14f','#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'];
    let charts = [];
    let data = [];

    function fmtUs(us) {
      if (us === null || us === undefined) return '—';
      if (us >= 1000) return `${(us / 1000).toFixed(2)}ms`;
      return `${us}µs`;
    }

    function fmtOps(ops) {
      if (ops === null || ops === undefined) return '—';
      if (ops >= 1000) return `${(ops / 1000).toFixed(1)}k/s`;
      return `${ops.toFixed(1)}/s`;
    }

    function fmtKb(kb) {
      if (kb === null || kb === undefined) return '—';
      if (kb >= 1024) return `${(kb / 1024).toFixed(1)}MB`;
      return `${kb}KB`;
    }

    function fmtMetric(metric, value) {
      if (metric === 'throughput_ops_per_sec') return fmtOps(value);
      if (metric === 'peak_rss_delta_kb') return fmtKb(value);
      return fmtUs(value);
    }

    function metricLabel(metric) {
      if (metric === 'throughput_ops_per_sec') return 'throughput (ops/s)';
      if (metric === 'peak_rss_delta_kb') return 'peak RSS delta (KB)';
      return metric.replace('_us', ' (µs)');
    }

    function pct(cur, prev) {
      if (prev === null || prev === undefined || prev === 0) return null;
      return ((cur - prev) / prev) * 100;
    }

    function fmtPct(p) {
      if (p === null) return '—';
      return `${p > 0 ? '+' : ''}${p.toFixed(1)}%`;
    }

    function label(entry) {
      const sha = entry.commitSha?.slice(0, 7) || '?';
      const date = new Date(entry.timestamp).toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
      return `${date} (${sha})`;
    }

    function scenarioNames() {
      return [...new Set(data.flatMap((d) => Object.keys(d.scenarios || {})))].sort();
    }

    function render() {
      const metric = document.getElementById('metric').value;
      charts.forEach((c) => c.destroy());
      charts = [];

      const labels = data.map(label);
      const scenarios = scenarioNames();

      // Render one chart per scenario.
      const grid = document.getElementById('scenarioCharts');
      grid.innerHTML = '';

      for (const [i, scenario] of scenarios.entries()) {
        const card = document.createElement('div');
        card.className = 'chart-card';

        const heading = document.createElement('h3');
        heading.textContent = `${scenario} – ${metricLabel(metric)}`;
        card.appendChild(heading);

        const canvas = document.createElement('canvas');
        card.appendChild(canvas);
        grid.appendChild(card);

        const series = data.map((d) => {
          const s = d.scenarios?.[scenario];
          return s ? s[metric] : null;
        });

        charts.push(new Chart(canvas, {
          type: 'line',
          data: {
            labels,
            datasets: [{
              label: scenario,
              data: series,
              borderColor: COLORS[i % COLORS.length],
              backgroundColor: COLORS[i % COLORS.length] + '33',
              fill: true,
              tension: 0.3,
              spanGaps: true,
            }],
          },
          options: {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
              y: {
                ticks: { callback: (v) => fmtMetric(metric, v) },
                beginAtZero: metric === 'throughput_ops_per_sec' || metric === 'peak_rss_delta_kb',
              },
            },
          },
        }));
      }

      renderComparison(metric);
      renderHistory(metric);
    }

    function renderComparison(metric) {
      const table = document.getElementById('comparisonTable');
      if (data.length < 2) {
        table.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Need at least 2 runs for comparison.</td></tr>';
        return;
      }

      const cur = data.at(-1);
      const prev = data.at(-2);
      const metrics = ['p50_us', 'p99_us', 'throughput_ops_per_sec', 'peak_rss_delta_kb'];
      const scenarios = scenarioNames();

      let html = '<thead><tr><th>Scenario</th><th>Metric</th><th>Previous</th><th>Current</th><th>Change</th></tr></thead><tbody>';

      for (const scenario of scenarios) {
        const c = cur.scenarios?.[scenario];
        const p = prev.scenarios?.[scenario];
        if (!c || !p) continue;

        for (const [i, m] of metrics.entries()) {
          const change = pct(c[m], p[m]);
          // For throughput, "regression" means a decrease.
          const isThroughput = m === 'throughput_ops_per_sec';
          const bad = isThroughput ? (change !== null && change < -5) : (change !== null && change > 5);
          const good = isThroughput ? (change !== null && change > 2) : (change !== null && change < -2);
          const rowCls = bad ? 'regression' : (good ? 'improvement' : '');
          const pctCls = bad ? 'warn' : (good ? 'good' : '');
          const first = i === 0 ? `<td rowspan="${metrics.length}" style="vertical-align:top;">${scenario}</td>` : '';
          html += `<tr class="${rowCls}">${first}<td>${metricLabel(m)}</td><td>${fmtMetric(m, p[m])}</td><td>${fmtMetric(m, c[m])}</td><td class="${pctCls}">${fmtPct(change)}</td></tr>`;
        }
      }

      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderHistory(metric) {
      const table = document.getElementById('historyTable');
      const scenarios = scenarioNames();

      let html = '<thead><tr><th>Date</th><th>Commit</th>';
      for (const s of scenarios) html += `<th>${s}</th>`;
      html += '</tr></thead><tbody>';

      for (let i = data.length - 1; i >= 0; i--) {
        const d = data[i];
        const date = new Date(d.timestamp).toLocaleDateString('en-GB', { year: 'numeric', month: 'short', day: 'numeric' });
        const sha = d.commitSha?.slice(0, 7) || '?';
        html += `<tr><td>${date}</td><td title="${(d.commitMessage || '').replace(/"/g, '&quot;')}">${sha}</td>`;
        for (const s of scenarios) {
          const value = d.scenarios?.[s]?.[metric];
          html += `<td>${fmtMetric(metric, value)}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody>';
      table.innerHTML = html;
    }

    document.getElementById('fileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result.trim();
        if (!text) { alert('File is empty.'); return; }
        try {
          data = text.split('\n').filter(Boolean).map((line) => JSON.parse(line));
        } catch (err) {
          alert('Error parsing file: ' + err.message);
          return;
        }
        document.getElementById('empty').style.display = 'none';
        document.getElementById('content').style.display = 'block';
        render();
      };
      reader.readAsText(file);
    });

    document.getElementById('metric').addEventListener('change', () => {
      if (data.length) render();
    });
  </script>
</body>
</html>
