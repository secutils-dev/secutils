/* Calc — smart calculator notepad */

:root, [data-theme="dark"] {
  --bg: #141519; --surface: #1d1e24; --surface-hover: #2c2d33;
  --border: #343741; --text: #dfe5ef; --text-muted: #98a2b3;
  --primary: #fed047; --primary-hover: #fdc615;
  --primary-text: #642340; --accent: #642340;
  --badge-bg: #2B394F; --badge-text: #98A8C3;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --mono: 'JetBrains Mono', 'Roboto Mono', monospace;
  --color-text: #dfe5ef;
  --color-link: #fed047; --color-link-hover: #fdc615;
  --color-number: #60a5fa; --color-operator: #c084fc;
  --color-currency: #6ee7b7; --color-variable: #5eead4;
  --color-reference: #2c2d33; --color-error: #f87171;
  --color-caret: #dfe5ef;
  --color-highlight: #3a3b42;
  --color-inline-hint: #5a5b65;
  --output-column: minmax(150px, 29%);
}
[data-theme="light"] {
  --bg: #f5f7fa; --surface: #ffffff; --surface-hover: #f1f3f5;
  --border: #d3dae6; --text: #343741; --text-muted: #69707d;
  --primary: #fed047; --primary-hover: #fdc615;
  --primary-text: #642340; --accent: #642340;
  --badge-bg: #E3E8F2; --badge-text: #505F79;
  --color-text: #413e41;
  --color-link: #054bb0; --color-link-hover: #0569fa;
  --color-number: #2f81d4; --color-operator: #ae39f6;
  --color-currency: #4eb323; --color-variable: #009688;
  --color-reference: #e0e6fa; --color-error: red;
  --color-caret: #000;
  --color-highlight: #dbdbdb;
  --color-inline-hint: #b1b1b1;
}

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font);
  font-size: 16px;
  color: var(--color-text);
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  transition: background .25s, color .25s;
}

a { color: var(--color-link); }
a:hover { color: var(--color-link-hover); }

/* Header */

.su-header { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 48px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; transition: background .25s, border-color .25s; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
.logo-svg { flex-shrink: 0; }
.logo-svg .logo-text-fill { fill: var(--text); transition: fill .25s; }
.logo-badge { display: inline-flex; align-items: center; padding: 4px 16px; border-radius: 4px; border: none; background: var(--badge-bg); color: var(--badge-text); font-size: 12px; font-weight: 450; line-height: 16px; white-space: nowrap; }
.header-right { display: flex; gap: 8px; align-items: center; }
.theme-toggle { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all .2s; }
.theme-toggle:hover { background: var(--surface-hover); color: var(--text); }
.theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

/* Footer */

.su-footer { text-align: center; padding: 12px 16px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.8rem; background: var(--surface); transition: background .25s, border-color .25s, color .25s; }

/* Layout */

main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.app {
  display: grid;
  grid-template-columns: 1fr 20px var(--output-column);
  flex: 1;
  margin: 0 auto;
  width: 100%;
  background: var(--surface);
  transition: background .25s;
}
@media (min-width: 1025px) {
  .app {
    max-width: 860px;
    margin: 24px auto;
    flex: unset;
    min-height: calc(100vh - 48px - 49px - 48px);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
}

.separator { display: flex; justify-content: center; cursor: ew-resize; }
.separator .separator-line { width: 1px; height: 100%; background: var(--border); transition: background .25s; }

/* Editor & Output panes */

#editor,
#output,
.prober {
  font-family: var(--mono);
  font-weight: 300;
  font-size: 18px;
  tab-size: 4;
  overflow: auto !important;
  padding: 17px 7px 17px 17px;
  line-height: 1.5;
  color: var(--color-text);
  caret-color: var(--color-caret);
}

#editor { resize: none !important; max-width: 100%; }
#editor a { cursor: pointer; }

#output { padding-right: 10px; padding-left: 0; }
#output div { display: flex; justify-content: flex-end; }
#output a { display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-decoration: none; cursor: pointer; padding: 0 10px; max-width: 100%; border-radius: 20px; color: inherit; }
#output a:hover { background: var(--color-reference); }
#output a.highlight { background: var(--color-highlight); }

.prober {
  overflow-wrap: break-word;
  white-space: pre-wrap;
  position: absolute;
  top: -10000px;
  left: -10000px;
  opacity: 0;
}

/* Notification toast */

#notification { visibility: hidden; opacity: 0; transform: translateY(-30px); transition: all 200ms cubic-bezier(0.4, 0, 0.2, 1); position: fixed; right: 17px; top: 60px; display: flex; flex-direction: column; background: #5ad227; color: #fff; border-radius: 30px; font-family: var(--font); font-weight: 600; font-size: 14px; padding: 10px 20px; z-index: 200; }
#notification.visible { visibility: visible; opacity: 1; transform: translateY(0); }

/* Syntax highlighting */

.number   { color: var(--color-number); }
.operator { color: var(--color-operator); }
.currency { color: var(--color-currency); }
.variable { color: var(--color-variable); }
.header   { font-weight: 600; }
.bold     { font-weight: 600; }
.none     { display: none; }

.wtf {
  color: var(--color-error);
}

.warning {
  text-decoration: wavy underline var(--color-error);
}

/* Line references & inline hints */

[data-line],
[data-line]:hover {
  color: currentColor;
}

[data-offset] { margin: 0 -10px; }
[data-offset]::before { content: attr(data-value); display: inline; white-space: nowrap; background: var(--color-reference); border-radius: 20px; padding: 0 10px; }

[data-inline]::after {
  content: attr(data-inline);
  display: inline;
  color: var(--color-inline-hint);
}

@media (max-width: 640px) {
  .su-header { padding: 0 12px; }
  .logo-svg { height: 20px; }
  .logo-badge { font-size: 11px; padding: 2px 7px; }
}

  </style>
