<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Debugger | Secutils.dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jose/4.14.4/index.umd.min.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
:root, [data-theme="dark"] {
    --bg: #141519;
    --surface: #1d1e24;
    --surface-hover: #2c2d33;
    --border: #343741;
    --text: #dfe5ef;
    --text-muted: #98a2b3;
    --primary: #fed047;
    --primary-hover: #fdc615;
    --primary-text: #642340;
    --accent: #642340;
    --badge-bg: #2B394F;
    --badge-text: #98A8C3;
    --header-color: #fb7185;
    --payload-color: #c084fc;
    --signature-color: #60a5fa;
    --input-bg: #25262c;
    --input-border: #343741;
    --focus-ring: #fed047;
    --success-bg: rgba(16,185,129,0.15);
    --success-text: #6ee7b7;
    --error-bg: rgba(239,68,68,0.15);
    --error-text: #fca5a5;
}
[data-theme="light"] {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --surface-hover: #f1f3f5;
    --border: #d3dae6;
    --text: #343741;
    --text-muted: #69707d;
    --primary: #fed047;
    --primary-hover: #fdc615;
    --primary-text: #642340;
    --accent: #642340;
    --badge-bg: #E3E8F2;
    --badge-text: #505F79;
    --header-color: #e11d48;
    --payload-color: #9333ea;
    --signature-color: #2563eb;
    --input-bg: #f5f7fa;
    --input-border: #d3dae6;
    --focus-ring: #642340;
    --success-bg: rgba(16,185,129,0.1);
    --success-text: #059669;
    --error-bg: rgba(239,68,68,0.1);
    --error-text: #dc2626;
}
*, *::before, *::after { box-sizing: border-box; }
body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background .3s, color .3s;
}
/* Header */
header {
    height: 48px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { display: flex; align-items: center; text-decoration: none; }
.logo-svg .logo-text-fill { fill: var(--text); }
.logo-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 16px;
    border-radius: 4px;
    border: none;
    background: var(--badge-bg);
    color: var(--badge-text);
    font-size: 12px;
    font-weight: 450;
    line-height: 16px;
    white-space: nowrap;
}
.header-right { display: flex; align-items: center; gap: 8px; }
/* Theme toggle */
.theme-toggle {
    width: 36px; height: 36px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted);
    cursor: pointer; transition: all .2s;
}
.theme-toggle:hover { background: var(--surface-hover); color: var(--text); }
.theme-toggle svg { width: 16px; height: 16px; fill: currentColor; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
[data-theme="dark"] .theme-toggle .icon-moon { display: none; }
/* Token colors */
.token-part-header { color: var(--header-color); }
.token-part-payload { color: var(--payload-color); }
.token-part-signature { color: var(--signature-color); }
.token-dot { color: var(--text-muted); }
/* Inputs */
.token-input, .json-editor, #secret-input {
    font-family: 'Roboto Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
    font-size: 0.875rem;
    line-height: 1.5;
}
.json-editor {
    min-height: 200px;
    background-color: var(--input-bg);
    border-color: var(--input-border);
    color: var(--text);
    border-radius: 8px;
    resize: vertical;
}
.json-editor:focus {
    outline: none;
    border-color: var(--focus-ring);
    box-shadow: 0 0 0 2px var(--focus-ring);
}
.json-editor.invalid { border-color: #f87171; }
/* Tabs */
.tab-btn {
    padding: 0.5rem 1rem;
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: inherit;
    font-size: 0.875rem;
    transition: color .15s, border-color .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
    color: var(--text);
    border-color: var(--primary);
}
.tab-content { display: none; }
.tab-content.active { display: block; }
/* Cards */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: background .3s, border-color .3s;
}
.card-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.card-body { padding: 16px; }
/* Buttons */
.btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font: 13px/1 'Inter', sans-serif;
    cursor: pointer;
    transition: all .15s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
}
.btn:hover:not(:disabled) { background: var(--surface-hover); border-color: var(--text-muted); }
.btn-primary {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--primary-text);
    font-weight: 600;
}
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); border-color: var(--primary-hover); }
/* Signature status */
.sig-valid { background: var(--success-bg); color: var(--success-text); }
.sig-invalid { background: var(--error-bg); color: var(--error-text); }
/* Main */
main { flex: 1; padding: 24px 16px 48px; max-width: 1200px; margin: 0 auto; width: 100%; }
/* Select */
.algo-select {
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: inherit;
    font-size: 0.875rem;
}
.algo-select:focus { outline: none; border-color: var(--focus-ring); box-shadow: 0 0 0 2px var(--focus-ring); }
/* Footer */
.su-footer {
    text-align: center;
    padding: 16px;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.8rem;
}
/* Table */
.claims-table { width: 100%; border-collapse: collapse; }
.claims-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
.claims-table td:first-child { color: var(--text-muted); font-family: 'Roboto Mono', monospace; font-size: 0.8rem; }
.claims-table td:last-child { color: var(--text); font-family: 'Roboto Mono', monospace; font-size: 0.8rem; }
.claims-desc { font-size: 0.7rem; color: var(--text-muted); display: block; margin-top: 2px; }
/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
/* Responsive */
@media (max-width: 640px) {
    header { padding: 0 12px; }
    .logo-svg { height: 20px !important; }
    .logo-badge { font-size: 11px; padding: 2px 7px; }
    .btn { padding: 6px 10px; font-size: 12px; }
    main { padding: 16px 12px 32px; }
}
    </style>

    <main>
        <div class="mb-6 flex justify-center" style="margin-bottom: 24px; display: flex; justify-content: center;">
            <div style="width: 100%; max-width: 24rem;">
                <label for="algorithm-select" style="display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px;">Algorithm</label>
                <select id="algorithm-select" class="algo-select" style="width: 100%;">
                    <option>HS256</option>
                    <option>HS384</option>
                    <option>HS512</option>
                    <option disabled>--- RS/ES/PS algorithms require key pairs ---</option>
                </select>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
            <!-- Encoded Panel -->
            <div style="display: flex; flex-direction: column;">
                <h2 style="font-size: 1rem; font-weight: 600; margin-bottom: 8px;">Encoded</h2>
                <div class="card" style="flex: 1; position: relative;">
                    <div class="card-body" style="height: 100%; min-height: 400px;">
                        <div id="encoded-output" contenteditable="true" spellcheck="false" class="token-input" style="width: 100%; height: 100%; min-height: 370px; white-space: pre-wrap; word-break: break-all; outline: none; font-size: 0.875rem; line-height: 1.6;"></div>
                    </div>
                    <div style="position: absolute; top: 12px; right: 12px; display: flex; gap: 6px;">
                        <button id="share-button" class="btn-primary btn">Share</button>
                        <button id="copy-button" class="btn">Copy</button>
                    </div>
                </div>
            </div>

            <!-- Decoded Panel -->
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <h2 style="font-size: 1rem; font-weight: 600;">Decoded</h2>

                <!-- Header -->
                <div class="card">
                    <div class="card-header" style="color: var(--header-color);">Header: Algorithm &amp; Token Type</div>
                    <div class="card-body">
                        <div style="border-bottom: 1px solid var(--border); margin-bottom: 8px;"><nav style="display: flex;" id="header-tabs"></nav></div>
                        <div id="header-tab-content"></div>
                    </div>
                </div>

                <!-- Payload -->
                <div class="card">
                    <div class="card-header" style="color: var(--payload-color);">Payload: Data</div>
                    <div class="card-body">
                        <div style="border-bottom: 1px solid var(--border); margin-bottom: 8px;"><nav style="display: flex;" id="payload-tabs"></nav></div>
                        <div id="payload-tab-content"></div>
                    </div>
                </div>

                <!-- Signature -->
                <div class="card">
                    <div class="card-header" style="color: var(--signature-color);">Verify Signature</div>
                    <div class="card-body">
                        <textarea id="secret-input" spellcheck="false" placeholder="Your-256-bit-secret" class="json-editor" style="width: 100%; border: 1px solid var(--input-border); padding: 12px; min-height: 80px; height: 80px;"></textarea>
                        <div id="signature-status" style="margin-top: 12px; text-align: center; font-weight: 600; padding: 8px 16px; border-radius: 8px; font-size: 0.875rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="su-footer">
        <p>A single-file JWT debugger for decoding, verifying, and generating JSON Web Tokens.</p>
    </footer>

<script>
(function() {
    // Theme toggle
    var toggle = document.getElementById('themeToggle');
    var root = document.documentElement;
    function setTheme(t) {
        root.setAttribute('data-theme', t);
        try { localStorage.setItem('su-tool-theme', t); } catch(e) {}
    }
    toggle.addEventListener('click', function() {
        setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
    try {
        var saved = localStorage.getItem('su-tool-theme');
        if (saved) setTheme(saved);
        else if (window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
    } catch(e) {}
})();

document.addEventListener('DOMContentLoaded', () => {
    const algorithmSelect = document.getElementById('algorithm-select');
    const encodedOutput = document.getElementById('encoded-output');
    const secretInput = document.getElementById('secret-input');
    const signatureStatus = document.getElementById('signature-status');
    const copyButton = document.getElementById('copy-button');
    const shareButton = document.getElementById('share-button');

    const defaultState = {
        header: { alg: 'HS256', typ: 'JWT' },
        payload: { sub: '1234567890', name: 'John Doe', iat: Math.floor(Date.now() / 1000) },
        secret: 'your-secret-key'
    };

    const JWT_CLAIMS = {
        iss: '(Issuer) Claim', sub: '(Subject) Claim', aud: '(Audience) Claim',
        exp: '(Expiration Time) Claim', nbf: '(Not Before) Claim', iat: '(Issued At) Claim', jti: '(JWT ID) Claim'
    };

    const base64UrlDecode = (str) => {
        str = str.replace(/-/g, '+').replace(/_/g, '/');
        while (str.length % 4) { str += '='; }
        try { return decodeURIComponent(escape(atob(str))); } catch (e) { return null; }
    };

    const updateSignatureStatusUI = (isValid) => {
        signatureStatus.textContent = isValid ? 'Signature Verified' : 'Invalid Signature';
        signatureStatus.className = isValid ? 'sig-valid' : 'sig-invalid';
        signatureStatus.style.cssText = 'margin-top: 12px; text-align: center; font-weight: 600; padding: 8px 16px; border-radius: 8px; font-size: 0.875rem; background:' + (isValid ? 'var(--success-bg)' : 'var(--error-bg)') + '; color:' + (isValid ? 'var(--success-text)' : 'var(--error-text)') + ';';
    };

    const updateDecodedFromToken = () => {
        const token = encodedOutput.innerText;
        const parts = token.split('.');
        if (parts.length !== 3) {
            updateSignatureStatusUI(false);
            return;
        }
        try {
            const headerJson = JSON.parse(base64UrlDecode(parts[0]));
            document.getElementById('decoded-header').value = JSON.stringify(headerJson, null, 2);
            populateTable('header-claims-table', headerJson);
        } catch (e) {
            document.getElementById('decoded-header').value = base64UrlDecode(parts[0]);
            populateTable('header-claims-table', null);
        }
        try {
            const payloadJson = JSON.parse(base64UrlDecode(parts[1]));
            document.getElementById('decoded-payload').value = JSON.stringify(payloadJson, null, 2);
            populateTable('payload-claims-table', payloadJson);
        } catch (e) {
            document.getElementById('decoded-payload').value = base64UrlDecode(parts[1]);
            populateTable('payload-claims-table', null);
        }
        verifyToken();
    };

    const updateEncoded = async () => {
        const header = JSON.parse(document.getElementById('decoded-header').value);
        const payload = JSON.parse(document.getElementById('decoded-payload').value);
        if (!header || !payload) {
            encodedOutput.innerText = 'Invalid JSON';
            updateSignatureStatusUI(false);
            return;
        }
        if (header.alg !== algorithmSelect.value) {
            header.alg = algorithmSelect.value;
            document.getElementById('decoded-header').value = JSON.stringify(header, null, 2);
        }
        try {
            const secretKey = new TextEncoder().encode(secretInput.value);
            const jwt = await new jose.SignJWT(payload).setProtectedHeader(header).sign(secretKey);
            const parts = jwt.split('.');
            encodedOutput.innerHTML = `<span class="token-part-header">${parts[0]}</span><span class="token-dot">.</span><span class="token-part-payload">${parts[1]}</span><span class="token-dot">.</span><span class="token-part-signature">${parts[2]}</span>`;
            updateSignatureStatusUI(true);
        } catch (err) {
            encodedOutput.textContent = `Error: ${err.message}`;
            updateSignatureStatusUI(false);
        }
    };

    const verifyToken = async () => {
        const token = encodedOutput.innerText;
        const secret = secretInput.value;
        if (!token || !secret || token.split('.').length !== 3) {
            updateSignatureStatusUI(false); return;
        }
        try {
            const secretKey = new TextEncoder().encode(secret);
            await jose.jwtVerify(token, secretKey, { algorithms: [algorithmSelect.value] });
            updateSignatureStatusUI(true);
        } catch (err) { updateSignatureStatusUI(false); }
    };

    const populateTable = (tableBodyId, data) => {
        const tbody = document.getElementById(tableBodyId);
        tbody.innerHTML = '';
        if (!data || typeof data !== 'object') return;
        for (const key in data) {
            const row = tbody.insertRow();
            const cellKey = row.insertCell();
            const cellValue = row.insertCell();
            cellKey.style.cssText = "padding: 6px 8px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid var(--border); vertical-align: top;";
            cellValue.style.cssText = "padding: 6px 8px; font-family: 'Roboto Mono', monospace; font-size: 0.8rem; color: var(--text); border-bottom: 1px solid var(--border);";
            let keyHtml = `<div>${key}</div>`;
            if (JWT_CLAIMS[key]) {
                keyHtml += `<div style="font-size: 0.7rem; color: var(--text-muted); margin-top: 2px;">${JWT_CLAIMS[key]}</div>`;
            }
            cellKey.innerHTML = keyHtml;
            let value = data[key];
            if ((key === 'iat' || key === 'exp' || key === 'nbf') && typeof value === 'number') {
                cellValue.textContent = `${value} (${new Date(value * 1000).toUTCString()})`;
            } else {
                cellValue.textContent = JSON.stringify(value);
            }
        }
    };

    const createTabs = (containerId, contentContainerId, idPrefix) => {
        const tabsContainer = document.getElementById(containerId);
        const contentDiv = document.getElementById(contentContainerId);
        tabsContainer.innerHTML = `
            <button class="tab-btn active" data-tab="${idPrefix}-json">JSON</button>
            <button class="tab-btn" data-tab="${idPrefix}-table">Table</button>`;
        contentDiv.innerHTML = `
            <div id="${idPrefix}-json" class="tab-content active">
                <textarea id="decoded-${idPrefix}" spellcheck="false" class="json-editor" style="width: 100%; border: 1px solid var(--input-border); padding: 12px;"></textarea>
            </div>
            <div id="${idPrefix}-table" class="tab-content">
                <table style="width: 100%; border-collapse: collapse;">
                    <tbody id="${idPrefix}-claims-table"></tbody>
                </table>
            </div>`;
        tabsContainer.addEventListener('click', e => {
            if (e.target.classList.contains('tab-btn')) {
                tabsContainer.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                contentDiv.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById(e.target.dataset.tab).classList.add('active');
            }
        });
        document.getElementById(`decoded-${idPrefix}`).addEventListener('input', () => {
            try {
                const jsonData = JSON.parse(document.getElementById(`decoded-${idPrefix}`).value);
                populateTable(`${idPrefix}-claims-table`, jsonData);
                updateEncoded();
            } catch (e) {
                // Invalid JSON, don't update
            }
        });
    };

    createTabs('header-tabs', 'header-tab-content', 'header');
    createTabs('payload-tabs', 'payload-tab-content', 'payload');
    algorithmSelect.addEventListener('change', updateEncoded);
    secretInput.addEventListener('input', updateEncoded);
    encodedOutput.addEventListener('input', updateDecodedFromToken);

    copyButton.addEventListener('click', () => {
        navigator.clipboard.writeText(encodedOutput.innerText).then(() => {
            copyButton.textContent = 'Copied!';
            setTimeout(() => { copyButton.textContent = 'Copy'; }, 2000);
        });
    });

    shareButton.addEventListener('click', () => {
        const jwtValue = encodedOutput.innerText.trim();
        if (!jwtValue || jwtValue === 'Invalid JSON') return;
        const secretValue = secretInput.value.trim();
        const encodedJwtForUrl = encodeURIComponent(jwtValue);
        const encodedSecretForUrl = encodeURIComponent(secretValue);
        const shareUrl = `${window.location.origin}${window.location.pathname}?jwt=${encodedJwtForUrl}&secret=${encodedSecretForUrl}`;
        navigator.clipboard.writeText(shareUrl).then(() => {
            shareButton.textContent = 'Link Copied!';
            setTimeout(() => { shareButton.textContent = 'Share'; }, 2000);
        });
    });

    const initialize = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const secretFromQuery = urlParams.get('secret');
        if (secretFromQuery != null) {
            secretInput.value = secretFromQuery;
        }
        const jwtFromQuery = urlParams.get('jwt');
        if (jwtFromQuery) {
            encodedOutput.innerText = jwtFromQuery;
            updateDecodedFromToken();
        } else {
            document.getElementById('decoded-header').value = JSON.stringify(defaultState.header, null, 2);
            document.getElementById('decoded-payload').value = JSON.stringify(defaultState.payload, null, 2);
            populateTable('header-claims-table', defaultState.header);
            populateTable('payload-claims-table', defaultState.payload);
            secretInput.value = defaultState.secret;
            algorithmSelect.value = defaultState.header.alg;
            updateEncoded();
        }
    };
    initialize();
});
</script>
<!-- Responsive grid override for mobile -->
<style>
@media (max-width: 1023px) {
    main > div:last-child { grid-template-columns: 1fr !important; }
}
</style>
</body>
