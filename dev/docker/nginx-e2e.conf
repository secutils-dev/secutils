# Webhook subdomain routing - mirrors Traefik IngressRoute in production.
server {
    listen       7171;
    listen  [::]:7171;
    server_name  ~^(.+)\.webhooks\.localhost$;

    location / {
        # Capture the original path (without query string) before rewrite overwrites $uri.
        # Traefik's replacePath stores only the path in X-Replaced-Path, mirror that here.
        set $original_uri $uri;
        rewrite ^ /api/webhooks break;
        proxy_pass http://secutils_api:7070;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Replaced-Path $original_uri;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen       7171 default_server;
    listen  [::]:7171 default_server;
    server_name  localhost;

    client_max_body_size 50m;
    gzip_static on;

    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        add_header Cache-Control no-cache;
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~ ^/(api/|api-docs) {
        proxy_pass http://secutils_api:7070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ^~ /docs {
        proxy_pass http://secutils_docs:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect http://localhost:8080/ http://$http_host/;
    }

    location /self-service/ {
        proxy_pass http://kratos:4433;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* \.(?:jpg|jpeg|png|webp|gz|svg|svgz|mp4|webm|css|js|br|gz)$ {
        root   /usr/share/nginx/html;
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
